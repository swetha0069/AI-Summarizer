<!DOCTYPE html>
<html>
<head>
    <title>AI Text Summarizer</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 40px; background-color: #f4f7f6; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        textarea { width: 100%; height: 200px; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { background-color: #007bff; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        button:hover { background-color: #0056b3; }
        .result-box { margin-top: 30px; padding: 20px; background: #e9ecef; border-left: 5px solid #007bff; }
        .stats { font-size: 0.9em; color: #666; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>AI Text Summarizer</h1>
        <p>Paste a long article below to condense it using AI.</p>
        <form action="/summarize" method="POST">
            <textarea name="data" placeholder="Enter your text here..." required></textarea>
            <button type="submit">Summarize Now</button>
        </form>

        {% if result %}
        <div class="result-box">
            <h2>Summary:</h2>
            <p>{{ result.summary }}</p>
            <div class="stats">
                <strong>Stats:</strong> {{ result.original_count }} words down to {{ result.new_count }} | 
                <strong>Readability:</strong> {{ result.readability }}
            </div>
        </div>
        {% endif %}
    </div>
</body>
</html>
